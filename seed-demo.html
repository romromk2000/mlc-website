    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Manrope', sans-serif; background: #f0faf9; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #fff; border-radius: 16px; padding: 40px; width: 520px; box-shadow: 0 8px 40px rgba(0,106,98,.12); }
    h1 { font-size: 20px; font-weight: 800; color: #006a62; margin-bottom: 4px; }
    .sub { font-size: 13px; color: #6c7a77; margin-bottom: 28px; }
    .credentials { background: #e0f2f1; border-radius: 10px; padding: 14px 16px; margin-bottom: 24px; font-size: 13px; }
    .credentials b { color: #006a62; }
    .credentials p { margin-top: 4px; }
    .step { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f0f0f3; font-size: 13px; }
    .step:last-child { border-bottom: none; }
    .step-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; background: #e2e2e5; color: #6c7a77; }
    .step-icon.ok   { background: #e6f4ea; color: #1b5e20; }
    .step-icon.err  { background: #ffdad6; color: #ba1a1a; }
    .step-icon.spin { background: #e0f2f1; }
    .spinner { width: 14px; height: 14px; border: 2px solid #b2dfdb; border-top-color: #006a62; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .step-label { flex: 1; font-weight: 600; }
    .step-detail { font-size: 11px; color: #6c7a77; margin-top: 2px; }
    .btn { display: block; width: 100%; padding: 13px; border-radius: 10px; border: none; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 700; background: #006a62; color: #fff; margin-top: 24px; transition: opacity .15s; }
    .btn:hover { opacity: .88; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .notice { font-size: 11px; color: #6c7a77; margin-top: 12px; text-align: center; line-height: 1.6; }
    a { color: #006a62; }
  </style>
</head>

  <p class="notice">
    Requires the <code>user_id</code> column on the <code>classes</code> table.<br>
    Run the migration in Supabase first if you haven't already.

</div>

]

const steps = [
  { id: 'account',  label: 'Create demo account' },
  { id: 'profile',  label: 'Set up organiser profile' },
  { id: 'classes',  label: 'Insert dummy classes (7 entries)' },
  { id: 'done',     label: 'All done' },
]

function renderSteps(states) {
  document.getElementById('steps').innerHTML = steps.map(s => {
    const st = states[s.id] || 'idle'
    const icon = st === 'ok'      ? '✓'
               : st === 'err'     ? '✕'
               : st === 'loading' ? '<div class="spinner"></div>'
               : '·'
    const cls = st === 'ok' ? 'ok' : st === 'err' ? 'err' : st === 'loading' ? 'spin' : ''
    return `<div class="step">
      <div class="step-icon ${cls}">${icon}</div>
      <div>
        <div class="step-label">${s.label}</div>
        ${states[s.id + '_detail'] ? `<div class="step-detail">${states[s.id + '_detail']}</div>` : ''}
      </div>
    </div>`
  }).join('')
}

async function runSeed() {
  const btn = document.getElementById('run-btn')
  btn.disabled = true; btn.textContent = 'Running…'

  const st = {}
  const set = (key, val, detail) => { st[key] = val; if (detail) st[key + '_detail'] = detail; renderSteps(st) }

  // 1. Create / sign in to demo account
  set('account', 'loading')
  let userId
  const { data: signIn, error: siErr } = await db.auth.signInWithPassword({ email: DEMO_EMAIL, password: DEMO_PASS })
  if (signIn?.user) {
    userId = signIn.user.id
    set('account', 'ok', 'Existing account found — signed in')
  } else {
    const { data: signUp, error: suErr } = await db.auth.signUp({ email: DEMO_EMAIL, password: DEMO_PASS })
    if (suErr || !signUp?.user) {
      set('account', 'err', suErr?.message || 'Sign-up failed')
      btn.disabled = false; btn.textContent = 'Retry'
      return
    }
    userId = signUp.user.id
    set('account', 'ok', 'New account created')
  }

  // 2. Upsert profile
  set('profile', 'loading')
  const { error: profErr } = await db.from('profiles').upsert({
    id: userId, first_name: 'Sarah', last_name: 'Mitchell',
    avatar_color: '#9395d3',
  })
  if (profErr) { set('profile', 'err', profErr.message); btn.disabled = false; btn.textContent = 'Retry'; return }
  set('profile', 'ok', 'Sarah Mitchell · demo.organiser@mylittlecircle.com')

  // 3. Insert classes
  set('classes', 'loading')
  const payload = DUMMY_CLASSES.map(c => ({ ...c, user_id: userId, organiser: 'Sarah Mitchell' }))
  const { error: clsErr } = await db.from('classes').insert(payload)
  if (clsErr) {
    set('classes', 'err', clsErr.message)
    btn.disabled = false; btn.textContent = 'Retry'
    return
  }
  set('classes', 'ok', '3 approved · 2 pending · 1 rejected · 1 one-off pending')

  // 4. Done
  set('done', 'ok', '')
  btn.textContent = 'Done!'
  btn.style.background = '#1b5e20'

  // Sign out so user can log in fresh on organiser portal
  await db.auth.signOut()

  document.querySelector('.notice').innerHTML =
    'Demo data created. <a href="organiser.html">Open the Organiser Portal</a> and sign in with the credentials above.'
}

renderSteps({})
</script>
</body>
